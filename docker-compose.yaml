services:
  redis:
    image: redis:latest
    container_name: vintage-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis:/data
  db:
    image: pgvector/pgvector:pg17
    restart: always
    container_name: vintagedb
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: vintagedb
    ports:
      - "5432:5432"
    volumes:
       - ./pgdata:/var/lib/postgresql/data

