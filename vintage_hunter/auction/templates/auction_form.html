{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm border-0">
      <div class="card-body p-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="fw-bold mb-0">{{ title }}</h2>
          <a href="{% if auction %}{% url 'auction:manage_auction' auction.id %}{% else %}{% url 'auction:get_list' %}{% endif %}"
            class="btn btn-link text-muted">
            <i class="bi bi-x-lg"></i>
          </a>
        </div>

        <form method="post" novalidate>
          {% csrf_token %}

          {% for field in form %}
          <div class="mb-4">
            <label for="{{ field.id_for_label }}" class="form-label small fw-bold text-uppercase opacity-75">{{
              field.label }}</label>
            {{ field }}
            {% if field.help_text %}
            <div class="form-text">{{ field.help_text }}</div>
            {% endif %}
            {% for error in field.errors %}
            <div class="text-danger small mt-1">{{ error }}</div>
            {% endfor %}
          </div>
          {% endfor %}

          <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-5">
            <a href="{% if auction %}{% url 'auction:manage_auction' auction.id %}{% else %}{% url 'auction:get_list' %}{% endif %}"
              class="btn btn-light px-4">{% trans "Cancel" %}</a>
            <button type="submit" class="btn btn-dark px-5">{% trans "Save Auction" %}</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
